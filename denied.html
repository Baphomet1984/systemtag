<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ACCESS DENIED</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

body{
background:black;
color:#ff3366;
font-family:'Space Mono', monospace;
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
overflow:hidden;
}

/* fondo glitch */
filter: contrast(160%) saturate(120%) hue-rotate(15deg) blur(1px);
/* texto principal */
.denied{
font-size:3rem;
letter-spacing:0.2em;
text-shadow:0 0 10px #ff3366;
margin-bottom:1rem;
}

/* texto terminal */
.log{
font-size:0.8rem;
letter-spacing:0.15em;
opacity:0.7;
}
  .log{
white-space: pre-line;
}

/* cursor parpadeante */
.cursor{
display:inline-block;
width:10px;
margin-left:4px;
}

.cursor::after{
content:"_";
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0;}
}

</style>
</head>

<body>

<div class="denied">ACCESS DENIED</div>

<div class="log">
<span id="log"></span><span class="cursor"></span>
</div>

  <script>
/* imágenes glitch aleatorias */

const glitches = [
"https://baphomet1984.github.io/systemtag/assets/img/ef86285047cebb78123093ebdd70cc6d.gif",
"https://baphomet1984.github.io/systemtag/assets/img/b40b709583ef693fb35645afe74544b9.gif",
"https://baphomet1984.github.io/systemtag/assets/img/ba10fe53b9fd389fa765eb58aadeeb8c.gif",
"https://baphomet1984.github.io/systemtag/assets/img/d1e5948463f89de6ebc6f1dcb09de35f.gif",
"https://baphomet1984.github.io/systemtag/assets/img/d33b2989bf0ae33aec7703f4e22f331d.jpg",
"https://baphomet1984.github.io/systemtag/assets/img/de77f3d12fe6c503106a638fad9c8871.gif",
"https://baphomet1984.github.io/systemtag/assets/img/e45e65e663653adc81fc7301a21a2a98.gif",
"https://baphomet1984.github.io/systemtag/assets/img/e48483fa463c08ab103a7d9a3efad5d1.gif",
"https://baphomet1984.github.io/systemtag/assets/img/f16f565a1a432e02f76087379550046a.jpg",
"https://baphomet1984.github.io/systemtag/assets/img/f545f22e932ba8c7299340db6c643dc4.gif",
"https://baphomet1984.github.io/systemtag/assets/img/fea79c830076818c5a2409fd03afa49b.jpg",
"https://baphomet1984.github.io/systemtag/assets/assets/img/fed3e9ae8c0652fbd50ed7970fa61d17.gif",
];

const rand = Math.floor(Math.random()*glitches.length);

document.body.style.backgroundImage = `url(${glitches[rand]})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";
const text = `
unauthorized node detected
connection blocked
systemtag gate protocol active
`;

let i = 0;
const speed = 35;
const log = document.getElementById("log");

function typeWriter(){
if(i < text.length){
log.textContent += text.charAt(i);
i++;
setTimeout(typeWriter, speed);
}
}

typeWriter();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ACCESS DENIED</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

body{
background:black;
color:#ff3366;
font-family:'Space Mono', monospace;
height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
overflow:hidden;
}

/* fondo glitch */

/* texto principal */
.denied{
font-size:3rem;
letter-spacing:0.2em;
text-shadow:0 0 10px #ff3366;
margin-bottom:1rem;
}

/* texto terminal */
.log{
font-size:0.8rem;
letter-spacing:0.15em;
opacity:0.7;
}
  .log{
white-space: pre-line;
}

/* cursor parpadeante */
.cursor{
display:inline-block;
width:10px;
margin-left:4px;
}

.cursor::after{
content:"_";
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0;}
}

</style>
</head>

<body>

<div class="denied">ACCESS DENIED</div>

<div class="log">
<span id="log"></span><span class="cursor"></span>
</div>

  <script>
/* imágenes glitch aleatorias */

const glitches = [
"https://baphomet1984.github.io/systemtag/assets/img/ef86285047cebb78123093ebdd70cc6d.gif",
"/assets/img/b40b709583ef693fb35645afe74544b9.gif",
"https://baphomet1984.github.io/systemtag/img/glitch3.jpg",
"https://baphomet1984.github.io/systemtag/img/glitch4.jpg"
];

const rand = Math.floor(Math.random()*glitches.length);

document.body.style.backgroundImage = `url(${glitches[rand]})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundPosition = "center";
const text = `
unauthorized node detected
connection blocked
systemtag gate protocol active
`;

let i = 0;
const speed = 35;
const log = document.getElementById("log");

function typeWriter(){
if(i < text.length){
log.textContent += text.charAt(i);
i++;
setTimeout(typeWriter, speed);
}
}

typeWriter();
</script>
</body>
</html>

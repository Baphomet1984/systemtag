body{

height:100vh;
margin:0;
display:flex;

justify-content:center;

.denied{
font-size:3rem;
letter-spacing:0.2em;
text-shadow:0 0 10px #ff3366;
margin-bottom:1rem;
background:rgba(0,0,0,0.9);
padding:0.5rem 1.5rem;
border-radius:4px;
}

.log{
font-size:0.8rem;
letter-spacing:0.15em;
opacity:0.7;
white-space:pre-line;
background:rgba(0,0,0,0.75);
padding:1rem 1.5rem;
border-radius:4px;
}

.cursor{
display:inline-block;
width:10px;
margin-left:4px;
}

.cursor::after{
content:"_";
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0;}
}

</style>
